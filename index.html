<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeCheck</title>
  <link rel="icon" type="image/png" href="titleimg.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="landing.css" />
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar__profile">
      <div class="topbar__avatar">N</div>
      <div>
        <p class="topbar__name">Nehad</p>
        <p class="topbar__sub">Developer &amp; music head</p>
      </div>
    </div>
    <nav class="topbar__links">
      <a class="topbar__link topbar__link--ig" href="https://instagram.com/_n3h4d" target="_blank" rel="noopener noreferrer">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
        @_n3h4d
      </a>
      <a class="topbar__link topbar__link--gh" href="https://github.com/nehad2" target="_blank" rel="noopener noreferrer">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
        nehad2
      </a>
    </nav>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- LEFT: Hero -->
    <section class="hero">
      <div class="hero__glow"></div>
      <div class="hero__content">
        <p class="hero__eyebrow">Welcome to</p>
        <h1 class="hero__title">VibeCheck</h1>
        <p class="hero__desc">
          Discover music by artist, explore by genre,<br>
          or let the universe drop something on you.
        </p>
        <a href="app.html" class="go-btn">
          <span class="go-btn__border"></span>
          <span class="go-btn__bg"></span>
          <span class="go-btn__label">
            GO
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </span>
        </a>
      </div>
    </section>

    <!-- RIGHT: Last Played -->
    <aside class="sidebar">
      <div class="sidebar__topbar"></div>
      <h2 class="sidebar__title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Last Played
      </h2>
      <ul class="sidebar__list" id="lastPlayedList"></ul>
      <p class="sidebar__empty hidden" id="lastPlayedEmpty">
        Nothing here yet —<br>go discover something.
      </p>
    </aside>

  </div>

  <script src="landing.js"></script>
</body>
</html>
